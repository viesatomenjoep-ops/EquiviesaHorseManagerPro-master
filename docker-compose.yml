version: '3.8'

services:
  db:
    image: postgres:15
    container_name: equiviesa_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: equiviesa
    ports:
      - "5432:5432"
    volumes:
      # Mount the master SQL file into the special entrypoint folder
      # Docker Postgres will automatically run this file when creating a fresh database!
      - ./supabase_master.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
